title: Suspicious Child Process Spawned By Archive Utility
id: 7f6f0f6b-6c7e-4f9d-8a9c-archive-child-process-demo
status: experimental
description: Detects suspicious child processes spawned by archive utilities such as WinRAR, 7-Zip, or Windows Explorer archive handling workflows.
author: Owls Hippie
date: 2026-05-04
references:
  - https://attack.mitre.org/techniques/T1204/002/
tags:
  - attack.execution
  - attack.t1204.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
      - '\WinRAR.exe'
      - '\rar.exe'
      - '\7z.exe'
      - '\7zFM.exe'
      - '\explorer.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
  condition: selection_parent and selection_child
falsepositives:
  - Administrative scripts launched from archive utilities
  - Legitimate software installers extracted from archives
level: medium