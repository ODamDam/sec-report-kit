title: Suspicious Apache Tomcat File Handling Request
id: 24813-demo-tomcat-file-handling-request
status: experimental
description: Detects suspicious HTTP request patterns that may indicate file handling abuse against Apache Tomcat.
author: Damin
date: 2026-05-10
references:
  - https://nvd.nist.gov/vuln/detail/CVE-2025-24813
tags:
  - attack.initial_access
  - attack.t1190
logsource:
  category: webserver
detection:
  selection_method:
    cs-method:
      - 'PUT'
      - 'POST'
  selection_path:
    cs-uri-stem|contains:
      - '../'
      - '..%2f'
      - '%2e%2e'
      - '.session'
  condition: selection_method and selection_path
falsepositives:
  - Legitimate application uploads
  - Internal testing
level: high