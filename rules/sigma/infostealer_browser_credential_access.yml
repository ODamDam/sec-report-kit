title: Suspicious Browser Credential Store Access
id: 4ad9c5a1-lumma-browser-credential-access-demo
status: experimental
description: Detects suspicious access to browser credential storage paths by non-browser processes.
author: Damin
date: 2026-05-10
references:
  - https://attack.mitre.org/techniques/T1555/
tags:
  - attack.credential_access
  - attack.t1555
logsource:
  product: windows
  category: file_access
detection:
  selection_path:
    TargetFilename|contains:
      - '\Google\Chrome\User Data\'
      - '\Microsoft\Edge\User Data\'
      - '\Mozilla\Firefox\Profiles\'
      - 'Login Data'
      - 'Local State'
  filter_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
  condition: selection_path and not filter_browser
falsepositives:
  - Backup software
  - Enterprise browser management tools
  - Security scanners
level: medium